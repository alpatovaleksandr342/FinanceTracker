version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: barbershop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barbershop
      PGDATA: /var/lib/postgresql/data/pgdata  # явно указываем поддиректорию
    ports:
      - "5432:5432"
    volumes:
      - barbershop_postgres_data:/var/lib/postgresql/data  # именованный том
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbershop"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Запрещаем создание анонимных томов
    tmpfs:
      - /tmp
      - /var/run/postgresql
  db-seed:
    image: node:20-alpine
    container_name: barbershop-seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/barbershop?schema=public"
    volumes:
      - ./packages/server/prisma:/app/prisma
      - ./packages/server/package.json:/app/package.json
      - ./packages/server/tsconfig.json:/app/tsconfig.json
    working_dir: /app
    command: >
      sh -c "
      npm install -g pnpm &&
      pnpm add -D prisma @prisma/client ts-node @types/node typescript bcryptjs &&
      pnpm prisma generate &&
      pnpm ts-node --transpile-only prisma/seed.ts
      "
    restart: "no"

volumes:
  # Явно объявляем том, который будем использовать
  barbershop_postgres_data:
    name: barbershop_postgres_data  # фиксированное имя тома
    external: false  # Docker сам создаст том с этим именем при первом запуске